<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDS 文档中心</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #333; background: #fff; display: flex; min-height: 100vh; }

    .sidebar { width: 260px; background: #f8f9fa; border-right: 1px solid #e0e0e0; padding: 20px 16px; flex-shrink: 0; overflow-y: auto; }
    .sidebar h2 { font-size: 16px; margin-bottom: 16px; color: #555; }
    .sidebar .group { margin-bottom: 16px; }
    .sidebar .group-title { font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; padding-left: 4px; }
    .sidebar ul { list-style: none; }
    .sidebar li { margin-bottom: 4px; }
    .sidebar a { text-decoration: none; color: #0366d6; font-size: 14px; display: block; padding: 4px 8px; border-radius: 4px; }
    .sidebar a:hover { background: #e8f0fe; }
    .sidebar a.active { background: #e8f0fe; font-weight: 600; color: #024ea1; }

    .content { flex: 1; max-width: 900px; margin: 0 auto; padding: 40px 32px; }

    .markdown-body h1 { font-size: 2em; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 16px; }
    .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-top: 24px; }
    .markdown-body h3 { font-size: 1.25em; margin-top: 20px; }
    .markdown-body p { margin-bottom: 12px; line-height: 1.7; }
    .markdown-body ul, .markdown-body ol { margin-bottom: 12px; padding-left: 28px; }
    .markdown-body li { margin-bottom: 4px; line-height: 1.6; }
    .markdown-body code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    .markdown-body pre { background: #f6f8fa; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body blockquote { border-left: 4px solid #ddd; padding-left: 16px; color: #666; margin-bottom: 12px; }
    .markdown-body a { color: #0366d6; }
    .markdown-body table { border-collapse: collapse; margin-bottom: 16px; }
    .markdown-body th, .markdown-body td { border: 1px solid #ddd; padding: 8px 12px; }
    .markdown-body th { background: #f6f8fa; }
    .markdown-body img { max-width: 100%; }
  </style>
</head>
<body>

  <nav class="sidebar">
    <h2>📖 EDS 文档</h2>

    <div class="group">
      <div class="group-title">ehome_prd</div>
      <ul>
        <li><a href="#/ehome_prd/edshome-upload-homeimg-v1.md" data-md="ehome_prd/edshome-upload-homeimg-v1.md">上传首页图片 v1</a></li>
      </ul>
    </div>

  </nav>

  <main class="content">
    <div id="markdown-body" class="markdown-body"></div>
  </main>

  <script>
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true
    });

    const contentEl = document.getElementById('markdown-body');
    const navLinks = document.querySelectorAll('.sidebar a');

    async function renderMarkdown(mdPath) {
      try {
        // 用相对路径，因为 index.html 和 ehome_prd/ 同级
        const resp = await fetch(mdPath);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const md = await resp.text();
        contentEl.innerHTML = marked.parse(md);

        navLinks.forEach(a => a.classList.toggle('active', a.dataset.md === mdPath));

        const h1 = contentEl.querySelector('h1');
        if (h1) document.title = h1.textContent + ' - EDS 文档';
      } catch (err) {
        contentEl.innerHTML = `<h1>😵 加载失败</h1><p>${err.message}</p><p>请确认文件 <code>${mdPath}</code> 存在。</p>`;
      }
    }

    function handleRoute() {
      const hash = location.hash.slice(2);
      if (hash) {
        renderMarkdown(hash);
      } else {
        renderMarkdown('ehome_prd/edshome-upload-homeimg-v1.md');
      }
    }

    window.addEventListener('hashchange', handleRoute);
    handleRoute();
  </script>
</body>
</html>
